<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Storm - Smart Software. Built for Growth.</title>
    <meta name="description" content="Professional websites and software solutions for South African businesses. Monthly packages starting from R799." />
    
    <!-- Storm Logo for Google Search Results and Social Media -->
    <link rel="icon" type="image/png" href="/storm-logo.png">
    <link rel="apple-touch-icon" href="/storm-logo.png">
    <link rel="canonical" href="/">
    <meta property="og:image" content="/storm-logo.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:type" content="image/png" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Storm - Smart Software. Built for Growth." />
    <meta property="og:description" content="Professional websites and software solutions for South African businesses. Monthly packages starting from R799." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://storm.co.za" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Storm - Smart Software. Built for Growth." />
    <meta name="twitter:description" content="Professional websites and software solutions for South African businesses. Monthly packages starting from R799." />
    <meta name="twitter:image" content="/storm-logo.png" />
    
    <!-- JSON-LD Structured Data for Google Organization Logo Recognition -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Storm",
      "url": "https://storm.co.za",
      "logo": "https://storm.co.za/storm-logo.png",
      "description": "Smart Software. Built for Growth. Professional websites and software solutions for South African businesses.",
      "sameAs": []
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
