name: Release Storm POS Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app (signed)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          npm install -g @tauri-apps/cli@latest 2>&1 | Select-Object -Last 5
          Write-Host "Building Tauri app..."
          tauri build
          Write-Host "Build complete."

      - name: Release and upload signed artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $date    = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
          $nsisDir = "src-tauri\target\release\bundle\nsis"
          $msiDir  = "src-tauri\target\release\bundle\msi"

          Write-Host "=== Bundle files ==="
          Get-ChildItem "src-tauri\target\release\bundle" -Recurse | ForEach-Object { Write-Host $_.FullName }

          $exe     = Get-ChildItem $nsisDir -Recurse | Where-Object { $_.Name -like "*-setup.exe"  -and $_.Name -notlike "*.zip*" } | Select-Object -First 1
          $msi     = Get-ChildItem $msiDir  -Recurse | Where-Object { $_.Name -like "*.msi"        -and $_.Name -notlike "*.zip*" } | Select-Object -First 1
          $nsisZip = Get-ChildItem $nsisDir -Recurse | Where-Object { $_.Name -like "*.nsis.zip"   -and $_.Name -notlike "*.sig"  } | Select-Object -First 1

          if (-not $exe) { Write-Host "ERROR: No installer"; exit 1 }
          Write-Host "Installer  : $($exe.Name)"
          Write-Host "MSI        : $($msi.Name)"
          Write-Host "NSIS zip   : $($nsisZip.Name)"

          $notes = "Storm POS $tag - Download the Windows installer. Existing installs update automatically on next launch."
          gh release create $tag --title "Storm POS $tag" --notes $notes

          gh release upload $tag $exe.FullName
          if ($msi)     { gh release upload $tag $msi.FullName }
          if ($nsisZip) { gh release upload $tag $nsisZip.FullName }

          $sig = ""
          if ($nsisZip) {
            $sigPath = $nsisZip.FullName + ".sig"
            if (Test-Path $sigPath) {
              $sig = (Get-Content $sigPath -Raw).Trim()
              Write-Host "Signature OK (length $($sig.Length))"
            } else {
              Write-Host "WARNING: .nsis.zip.sig not found at $sigPath"
            }
          }

          $zipName     = if ($nsisZip) { $nsisZip.Name -replace ' ', '.' } else { $exe.Name -replace ' ', '.' }
          $downloadUrl = "https://github.com/storm-za/Storm-POS/releases/download/$tag/$zipName"

          $latestJson = [ordered]@{
            version   = $version
            notes     = "Improvements and bug fixes."
            pub_date  = $date
            platforms = @{ "windows-x86_64" = [ordered]@{ url = $downloadUrl; signature = $sig } }
          } | ConvertTo-Json -Depth 5

          $latestJson | Out-File "latest.json" -Encoding utf8NoBOM
          Write-Host "=== latest.json ===" ; Get-Content "latest.json"

          gh release upload $tag latest.json
          Write-Host "Done - release $tag complete."
