name: Release Storm POS Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Storm POS ${{ github.ref_name }}"
          releaseBody: |
            ## Storm POS Desktop App ${{ github.ref_name }}

            Download the Windows installer below — no browser needed.

            **Requirements:** Windows 10/11 · Internet connection required

            **Already installed?** The app will notify you on next launch if an update is available.
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json for auto-updater
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $date = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
          $nsisDir = "src-tauri\target\release\bundle\nsis"

          Write-Host "=== All files in bundle directory ==="
          Get-ChildItem "src-tauri\target\release\bundle" -Recurse | ForEach-Object { Write-Host $_.FullName }

          # Locate the NSIS zip updater bundle (.nsis.zip) — this is what Tauri v2 updater downloads
          $zipFile = Get-ChildItem $nsisDir -Recurse | Where-Object { $_.Name -like "*.nsis.zip" -and $_.Name -notlike "*.sig" } | Select-Object -First 1
          if (-not $zipFile) {
            Write-Host "ERROR: No .nsis.zip found — cannot generate latest.json"
            exit 0
          }
          Write-Host "Updater bundle: $($zipFile.Name)"

          # GitHub replaces spaces with dots in download URLs for binary assets
          $encodedName = $zipFile.Name -replace ' ', '.'
          $downloadUrl = "https://github.com/storm-za/Storm-POS/releases/download/$tag/$encodedName"
          Write-Host "Download URL: $downloadUrl"

          # Locate the matching .nsis.zip.sig signature file
          $sigPath = $zipFile.FullName + ".sig"
          $signature = ""
          if (Test-Path $sigPath) {
            $signature = (Get-Content $sigPath -Raw).Trim()
            Write-Host "Signature found: $sigPath"
            Write-Host "Signature (first 40 chars): $($signature.Substring(0, [Math]::Min(40, $signature.Length)))"
          } else {
            Write-Host "WARNING: No .nsis.zip.sig file found at: $sigPath"
            # Try alternate location: look for any .zip.sig
            $altSig = Get-ChildItem "src-tauri\target\release\bundle" -Recurse | Where-Object { $_.Name -like "*.zip.sig" } | Select-Object -First 1
            if ($altSig) {
              $signature = (Get-Content $altSig.FullName -Raw).Trim()
              Write-Host "Found alternate sig: $($altSig.FullName)"
            }
          }

          if ($signature -eq "") {
            Write-Host "ERROR: No signature found — latest.json will lack signature (updater will reject it)"
          }

          $platformEntry = [ordered]@{
            url       = $downloadUrl
            signature = $signature
          }

          $latestJson = [ordered]@{
            version   = $version
            notes     = "Improvements and bug fixes."
            pub_date  = $date
            platforms = @{ "windows-x86_64" = $platformEntry }
          } | ConvertTo-Json -Depth 5

          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          # Upload the .nsis.zip and .nsis.zip.sig files to the release as well
          gh release upload $tag $zipFile.FullName --clobber
          if (Test-Path $sigPath) { gh release upload $tag $sigPath --clobber }

          # Upload latest.json
          gh release upload $tag latest.json --clobber
          Write-Host "Done — latest.json and updater bundles uploaded to release $tag"
